<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arihant Kurta House</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>Arihant Kurta House</h1>

<p>Fill your details below and continue on WhatsApp.</p>

<form id="leadForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="tel"
id="phone"
placeholder="Mobile Number"
required>

<input
type="text"
id="city"
placeholder="City"
required>

<input
type="text"
id="product"
placeholder="Product Interested In"
required>

<button type="submit">
Continue on WhatsApp
</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
