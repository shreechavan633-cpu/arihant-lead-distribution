<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arihant Kurta House</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>🛍️ Arihant Kurta House</h1>

<p class="tagline">
    ✨ <strong>SURAT'S BIGGEST KURTA MANUFACTURER</strong> ✨
</p>

<form id="leadForm">

<div class="features">
    <p>🏭 Trusted by <strong>1000+</strong> Wholesale Buyers</p>
    <p>👕 Kurtas Starting From <strong>₹80</strong></p>
<p>🩳 Pajamas Starting From <strong>₹50</strong></p>
    <p>🚚 <strong>Cash On Delivery Available</strong></p>
</div>

<div class="form-group">
    <input
        type="text"
        id="businessName"
        placeholder="Business Name"
        required
    >
</div>

<div class="form-group">
    <input
        type="tel"
        id="phone"
        placeholder="Mobile Number"
        required
    >
</div>

<button type="submit">
💬 Continue on WhatsApp

</form>

</div>

<script src="script.js"></script>

</body>
</html>
