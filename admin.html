<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="admin.css">
</head>
<body>

<h1>Arihant Kurta House Admin Dashboard</h1>

<div class="stats">

    <div class="card">
        <h3>Today's Leads</h3>
        <h2 id="todayCount">0</h2>
    </div>

    <div class="card">
        <h3>Yesterday</h3>
        <h2 id="yesterdayCount">0</h2>
    </div>

    <div class="card">
        <h3>This Month</h3>
        <h2 id="monthCount">0</h2>
    </div>

    <div class="card">
        <h3>Total Leads</h3>
        <h2 id="totalCount">0</h2>
    </div>

    <div class="card">
        <h3>Pending</h3>
        <h2 id="pendingCount">0</h2>
    </div>

</div>

<div class="search-box">
    <input
    type="text"
    id="searchInput"
    placeholder="Search by name or phone..."
/>

<button id="refreshBtn">🔄 Refresh</button>
</div>

<table>

<thead>
<tr>
    <th>Name</th>
    <th>Phone</th>
    <th>Assigned To</th>
    <th>Date</th>
</tr>
</thead>

<tbody id="tableBody">

</tbody>

</table>

<script src="admin.js"></script>

</body>
</html>
